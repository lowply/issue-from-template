name: 'Issue From Template'
author: 'Sho Mizutani <lowply@github.com>'
description: 'A GitHub Action that opens an issue from an issue template'
inputs:
  template-name:
    description: 'The name of the issue template file (e.g. report.md). Looked up in .github/ISSUE_TEMPLATE/.'
    required: true
  add-dates:
    description: 'Number of days to add to the current date. Useful for creating issues for the next week.'
    required: false
    default: ''
runs:
  using: 'composite'
  steps:
    - name: Determine runner architecture
      id: arch
      shell: bash
      run: |
        case "$(uname -m)" in
          x86_64)  echo "arch=amd64" >> "$GITHUB_OUTPUT" ;;
          aarch64) echo "arch=arm64" >> "$GITHUB_OUTPUT" ;;
          arm64)   echo "arch=arm64" >> "$GITHUB_OUTPUT" ;;
          *)       echo "::error::Unsupported architecture: $(uname -m)"; exit 1 ;;
        esac

    - name: Download pre-built binary
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        REPO="lowply/issue-from-template"
        BINARY="issue-from-template-linux-${{ steps.arch.outputs.arch }}"
        gh release download --repo "$REPO" --pattern "$BINARY" --dir "${{ runner.temp }}" --clobber
        chmod +x "${{ runner.temp }}/$BINARY"
        echo "BINARY_PATH=${{ runner.temp }}/$BINARY" >> "$GITHUB_ENV"

    - name: Run issue-from-template
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_WORKSPACE: ${{ github.workspace }}
        IFT_TEMPLATE_NAME: ${{ inputs.template-name }}
        ADD_DATES: ${{ inputs.add-dates }}
      run: "$BINARY_PATH"
branding:
  icon: 'alert-circle'
  color: 'green'
